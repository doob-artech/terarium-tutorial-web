name: Publish Tutorial Image

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: terarium-tutorial-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on:
      - self-hosted
      - windows
      - terarium-builder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/doob-artech/terarium-tutorial:latest
            ghcr.io/doob-artech/terarium-tutorial:${{ github.sha }}

      - name: Trigger deploy repo
        if: ${{ secrets.DEPLOY_REPO_TOKEN != '' }}
        shell: pwsh
        run: |
          $headers = @{
            Accept = 'application/vnd.github+json'
            Authorization = 'Bearer ${{ secrets.DEPLOY_REPO_TOKEN }}'
            'X-GitHub-Api-Version' = '2022-11-28'
          }
          $body = @{
            event_type = 'tutorial-updated'
            client_payload = @{
              source_repo = '${{ github.repository }}'
              sha = '${{ github.sha }}'
            }
          } | ConvertTo-Json -Depth 5
          Invoke-RestMethod -Method Post -Uri 'https://api.github.com/repos/doob-artech/terarium-deploy/dispatches' -Headers $headers -Body $body
