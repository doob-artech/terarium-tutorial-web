name: Deploy From Local Runner

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terarium-local-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, Windows, X64, terarium-builder]
    timeout-minutes: 60
    steps:
      - name: Checkout pushed repo
        uses: actions/checkout@v4

      - name: Sync repo and rebuild stack
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $ErrorActionPreference = 'Stop'
          $repoName = 'terarium-tutorial'
          $isDeployRepo = $false
          $root = 'D:\doob'
          $target = Join-Path $root $repoName

          if (!(Test-Path $target)) {
            New-Item -ItemType Directory -Force -Path $target | Out-Null
          }

          $excludeDirs = @('.git', 'node_modules', 'dist', 'dist-ssr')
          $excludeFiles = @('.env', '*.log')
          if ($isDeployRepo) {
            $excludeDirs += @('env', '.cloudflared')
            $excludeFiles += @('cloudflared.stdout.log', 'cloudflared.stderr.log')
          }

          robocopy $env:GITHUB_WORKSPACE $target /MIR /XD $excludeDirs /XF $excludeFiles /NFL /NDL /NJH /NJS /NP
          $copyCode = $LASTEXITCODE
          if ($copyCode -gt 7) { throw "robocopy failed with exit code $copyCode" }

          if ($isDeployRepo) {
            robocopy (Join-Path $env:GITHUB_WORKSPACE 'env') (Join-Path $target 'env') *.example /E /NFL /NDL /NJH /NJS /NP
            if ($LASTEXITCODE -gt 7) { throw 'env example sync failed' }
            robocopy (Join-Path $env:GITHUB_WORKSPACE '.cloudflared') (Join-Path $target '.cloudflared') *.example.yml /E /NFL /NDL /NJH /NJS /NP
            if ($LASTEXITCODE -gt 7) { throw 'cloudflared example sync failed' }
          }

          docker version
          if ($LASTEXITCODE -ne 0) {
            throw 'Runner account cannot access Docker. Add githubrunner to docker-users or run the runner service as VILAB.'
          }

          powershell -ExecutionPolicy Bypass -File (Join-Path $root 'terarium-deploy\start-terarium-stack.ps1')
          if ($LASTEXITCODE -ne 0) { throw 'start-terarium-stack.ps1 failed' }
          powershell -ExecutionPolicy Bypass -File (Join-Path $root 'terarium-deploy\start-cloudflared.ps1')
          if ($LASTEXITCODE -ne 0) { throw 'start-cloudflared.ps1 failed' }